name: Täglicher Müll-Tracker Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: API-Daten herunterladen (curl)
        run: |
          curl -L --max-time 300 --retry 3 --retry-delay 30 \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: application/json, text/plain, */*" \
            -o meldungen.json \
            "https://ordnungsamt.berlin.de/frontend.webservice.opendata/api/meldungen"
          echo "Download abgeschlossen: $(du -sh meldungen.json)"

      - name: Tracker ausführen (lokale JSON verarbeiten)
        run: python tracker.py

      - name: HTML regenerieren
        run: python export_html.py

      - name: DB und index.html committen
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add index.html ordnungsamt.db
          git diff --staged --quiet || git commit -m "Auto-Update: $(date '+%Y-%m-%d')"
          git push
