name: Täglicher Müll-Tracker Update

on:
  schedule:
    # Täglich um 06:00 Uhr UTC (08:00 Uhr Berlin-Zeit)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Erlaubt manuellen Start über GitHub UI

permissions:
  contents: write  # Notwendig, um index.html zurück ins Repo zu committen

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      # Bestehende Datenbank aus letztem Artifact wiederherstellen
      - name: Datenbank aus Artifact laden (falls vorhanden)
        uses: actions/download-artifact@v4
        with:
          name: ordnungsamt-db
          path: .
        continue-on-error: true  # Erster Lauf hat noch kein Artifact

      - name: Tracker ausführen (Daten holen + Hotspots berechnen)
        run: python tracker.py

      - name: App-HTML regenerieren
        run: python export_html.py

      - name: Datenbank als Artifact speichern (persistiert zwischen Runs)
        uses: actions/upload-artifact@v4
        with:
          name: ordnungsamt-db
          path: ordnungsamt.db
          retention-days: 90  # 90 Tage aufbewahren

      - name: Geänderte index.html committen und pushen
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add index.html
          # Nur committen wenn es Änderungen gibt
          git diff --staged --quiet || git commit -m "Auto-Update: $(date '+%Y-%m-%d') Müll-Daten aktualisiert"
          git push
