name: Täglicher Müll-Tracker Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3

      - name: Python einrichten
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Datenbank aus Artifact laden (falls vorhanden)
        uses: actions/download-artifact@v3
        with:
          name: ordnungsamt-db
          path: .
        continue-on-error: true

      - name: Tracker ausführen
        run: python tracker.py
        continue-on-error: true

      - name: App-HTML regenerieren
        run: python export_html.py

      - name: Datenbank als Artifact speichern
        uses: actions/upload-artifact@v3
        with:
          name: ordnungsamt-db
          path: ordnungsamt.db
          retention-days: 90

      - name: index.html committen und pushen
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-Update: $(date '+%Y-%m-%d')"
          git push
